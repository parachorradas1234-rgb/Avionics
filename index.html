<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avionics SVQH - P/N List</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: system-ui, -apple-system, sans-serif; }
    </style>
</head>
<body class="p-4 max-w-md mx-auto pb-20">

    <header class="text-center my-4">
        <h1 class="text-2xl font-bold text-sky-400 tracking-wide">AVIONICS SVQH</h1>
        <p class="text-xs text-slate-400">P/N Consumibles & Tools</p>
    </header>

    <div class="flex bg-slate-800 rounded-lg p-1 mb-4 text-sm font-medium">
        <button id="btn-lista" onclick="cambiarPestana('lista')" class="flex-1 py-2 rounded-md text-center bg-sky-500 text-white">
            🔍 Buscar Listado
        </button>
        <button id="btn-admin" onclick="cambiarPestana('admin')" class="flex-1 py-2 rounded-md text-center text-slate-400">
            ➕ Añadir Artículo
        </button>
    </div>

    <div id="pestana-lista" class="space-y-4">
        <div class="relative">
            <input type="text" id="buscador" oninput="filtrarArticulos()" placeholder="Buscar por nombre o Part Number..." 
                   class="w-full bg-slate-800 border border-slate-700 text-white placeholder-slate-400 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-sky-500">
        </div>

        <p class="text-xs text-slate-400 pl-1"><span id="contador-items">0</span> artículos encontrados</p>

        <div id="lista-articulos" class="space-y-3">
            </div>
    </div>

    <div id="pestana-admin" class="hidden space-y-4">
        <div id="bloqueo-auth" class="bg-slate-800 border border-slate-700 rounded-2xl p-6 text-center space-y-4">
            <div class="text-4xl">🔒</div>
            <h3 class="text-base font-semibold">Se requiere contraseña</h3>
            <p class="text-xs text-slate-400">Introduce la contraseña de Avionics SVQH para añadir nuevas piezas.</p>
            <input type="password" id="input-password" placeholder="Contraseña de acceso" 
                   class="w-full bg-slate-900 border border-slate-700 text-center rounded-xl px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-sky-500">
            <button onclick="verificarPassword()" class="w-full bg-sky-500 hover:bg-sky-600 font-semibold py-2 rounded-xl text-sm transition">
                Acceder
            </button>
        </div>

        <div id="formulario-anadir" class="hidden bg-slate-800 border border-slate-700 rounded-2xl p-5 space-y-4">
            <div class="flex justify-between items-center border-b border-slate-700 pb-2">
                <h3 class="font-semibold text-green-400 text-sm">✓ Autorizado: Nuevo Artículo</h3>
                <button onclick="cerrarSesion()" class="text-xs text-rose-400 underline">Cerrar sesión</button>
            </div>
            
            <div>
                <label class="block text-xs text-slate-400 mb-1">Nombre del Artículo / Material</label>
                <input type="text" id="form-articulo" placeholder="Ej. O-RING 3" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-2 text-sm text-white focus:outline-none focus:ring-1 focus:ring-sky-500">
            </div>

            <div>
                <label class="block text-xs text-slate-400 mb-1">Part Number (P/N)</label>
                <input type="text" id="form-pn" placeholder="Ej. MS29513-010" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-2 text-sm text-white focus:outline-none focus:ring-1 focus:ring-sky-500">
            </div>

            <div>
                <label class="block text-xs text-slate-400 mb-1">Sección o Categoría</label>
                <input type="text" id="form-seccion" placeholder="Ej. Consumibles (General) o Tools" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-2 text-sm text-white focus:outline-none focus:ring-1 focus:ring-sky-500">
            </div>

            <button onclick="guardarNuevoArticulo()" class="w-full bg-green-500 hover:bg-green-600 text-white font-bold py-3 rounded-xl text-sm shadow-md transition">
                Guardar Artículo
            </button>
        </div>
    </div>

    <script src="data.js"></script>
    <script>
        let listaArticulos = JSON.parse(localStorage.getItem('svqh_items')) || ARTICULOS_INICIALES;
        let autenticado = false;
        const CLAVE_CORRECTA = "SVQH1234"; // <<< AQUÍ SE CAMBIA LA CONTRASEÑA

        function cambiarPestana(target) {
            const btnLista = document.getElementById('btn-lista');
            const btnAdmin = document.getElementById('btn-admin');
            const pLista = document.getElementById('pestana-lista');
            const pAdmin = document.getElementById('pestana-admin');

            if (target === 'lista') {
                btnLista.className = "flex-1 py-2 rounded-md text-center bg-sky-500 text-white";
                btnAdmin.className = "flex-1 py-2 rounded-md text-center text-slate-400";
                pLista.classList.remove('hidden');
                pAdmin.classList.add('hidden');
                renderListar(listaArticulos);
            } else {
                btnAdmin.className = "flex-1 py-2 rounded-md text-center bg-sky-500 text-white";
                btnLista.className = "flex-1 py-2 rounded-md text-center text-slate-400";
                pAdmin.classList.remove('hidden');
                pLista.classList.add('hidden');
                evaluarAuthUI();
            }
        }

        function renderListar(items) {
            const container = document.getElementById('lista-articulos');
            const contador = document.getElementById('contador-items');
            container.innerHTML = '';
            contador.innerText = items.length;

            if (items.length === 0) {
                container.innerHTML = `<div class="text-center text-xs text-slate-500 py-8">No se encontraron artículos.</div>`;
                return;
            }

            items.forEach(item => {
                const card = document.createElement('div');
                card.className = "bg-slate-800 border border-slate-700/60 rounded-xl p-4 shadow-sm space-y-1";
                card.innerHTML = `
                    <div class="flex justify-between items-start">
                        <h4 class="font-bold text-white text-sm uppercase tracking-wide pr-2">${item.articulo}</h4>
                        <span class="text-[10px] bg-slate-900 text-sky-400 font-semibold px-2 py-0.5 rounded border border-sky-900/40 shrink-0">
                            ${item.seccion}
                        </span>
                    </div>
                    <div class="flex items-center justify-between pt-1">
                        <span class="text-xs text-slate-400">P/N:</span>
                        <code class="text-xs font-mono font-bold text-amber-400 select-all bg-slate-900/60 px-2 py-0.5 rounded border border-slate-700/40">${item.pn}</code>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function filtrarArticulos() {
            const query = document.getElementById('buscador').value.toLowerCase().trim();
            const filtrados = listaArticulos.filter(item => 
                item.articulo.toLowerCase().includes(query) || 
                item.pn.toLowerCase().includes(query) ||
                item.seccion.toLowerCase().includes(query)
            );
            renderListar(filtrados);
        }

        function verificarPassword() {
            const pass = document.getElementById('input-password').value;
            if (pass === CLAVE_CORRECTA) {
                autenticado = true;
                evaluarAuthUI();
            } else {
                alert("Contraseña incorrecta");
            }
        }

        function evaluarAuthUI() {
            const authBlock = document.getElementById('bloqueo-auth');
            const formBlock = document.getElementById('formulario-anadir');
            if (autenticado) {
                authBlock.classList.add('hidden');
                formBlock.classList.remove('hidden');
            } else {
                authBlock.classList.remove('hidden');
                formBlock.classList.add('hidden');
            }
        }

        function cerrarSesion() {
            autenticado = false;
            document.getElementById('input-password').value = '';
            evaluarAuthUI();
        }

        function guardarNuevoArticulo() {
            const art = document.getElementById('form-articulo').value.trim();
            const pn = document.getElementById('form-pn').value.trim();
            const sec = document.getElementById('form-seccion').value.trim();

            if (!art || !pn || !sec) {
                alert("Por favor rellena todos los campos.");
                return;
            }

            listaArticulos.unshift({ articulo: art, pn: pn, seccion: sec });
            localStorage.setItem('svqh_items', JSON.stringify(listaArticulos));

            alert("¡Artículo guardado con éxito!");
            
            document.getElementById('form-articulo').value = '';
            document.getElementById('form-pn').value = '';
            document.getElementById('form-seccion').value = '';
            cambiarPestana('lista');
        }

        renderListar(listaArticulos);
    </script>
</body>
</html>
