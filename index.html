<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avionics SVQH - P/N List</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: system-ui, -apple-system, sans-serif; }
    </style>
</head>
<body class="p-4 max-w-md mx-auto pb-20 pt-8">

    <div class="fixed top-2 left-3 z-50 pointer-events-none">
        <span class="text-[10px] font-black tracking-wider text-rose-500 drop-shadow-[0_2px_4px_rgba(0,0,0,0.8)]">
            ONLY FOR REFERENCE
        </span>
    </div>

    <header class="text-center my-4 mt-6">
        <h1 class="text-2xl font-bold text-sky-400 tracking-wide">AVIONICS SVQH</h1>
        <p class="text-xs text-slate-400">P/N Consumibles & Tools</p>
    </header>

    <div class="flex bg-slate-800 rounded-xl p-1 mb-4 text-sm font-medium">
        <button id="btn-lista" onclick="cambiarPestana('lista')" class="flex-1 py-2 rounded-md text-center bg-sky-500 text-white transition-all">
            🔍 Buscar Secciones
        </button>
        <button id="btn-admin" onclick="cambiarPestana('admin')" class="flex-1 py-2 rounded-md text-center text-slate-400 transition-all">
            ➕ Añadir Artículo
        </button>
    </div>

    <div id="pestana-lista" class="space-y-4">
        <div class="relative">
            <input type="text" id="buscador" oninput="filtrarYAgrupar()" placeholder="Buscar artículo o Part Number..." 
                   class="w-full bg-slate-800 border border-slate-700 text-white placeholder-slate-400 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-sky-500">
        </div>

        <p class="text-xs text-slate-400 pl-1"><span id="contador-items">0</span> piezas disponibles en total</p>

        <div id="contenedor-secciones" class="space-y-3">
            </div>
    </div>

    <div id="pestana-admin" class="hidden space-y-4">
        <div id="bloqueo-auth" class="bg-slate-800 border border-slate-700 rounded-2xl p-6 text-center space-y-4">
            <div class="text-4xl">🔒</div>
            <h3 class="text-base font-semibold">Acceso Protegido</h3>
            <p class="text-xs text-slate-400">Introduce la contraseña de Avionics SVQH para dar de alta componentes.</p>
            <input type="password" id="input-password" placeholder="Contraseña" 
                   class="w-full bg-slate-900 border border-slate-700 text-center rounded-xl px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-sky-500">
            <button onclick="verificarPassword()" class="w-full bg-sky-500 hover:bg-sky-600 font-semibold py-2 rounded-xl text-sm transition">
                Acceder
            </button>
        </div>

        <div id="formulario-anadir" class="hidden bg-slate-800 border border-slate-700 rounded-2xl p-5 space-y-4">
            <div class="flex justify-between items-center border-b border-slate-700 pb-2">
                <h3 class="font-semibold text-green-400 text-sm">✓ Personal Autorizado</h3>
                <button onclick="cerrarSesion()" class="text-xs text-rose-400 underline">Salir</button>
            </div>
            
            <div>
                <label class="block text-xs text-slate-400 mb-1">Nombre del Artículo / Material</label>
                <input type="text" id="form-articulo" placeholder="Ej. O-RING 3" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-2 text-sm text-white focus:outline-none">
            </div>

            <div>
                <label class="block text-xs text-slate-400 mb-1">Part Number (P/N)</label>
                <input type="text" id="form-pn" placeholder="Ej. MS29513-010" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-2 text-sm text-white focus:outline-none">
            </div>

            <div>
                <label class="block text-xs text-slate-400 mb-1">Sección o Categoría (Grupo)</label>
                <input type="text" id="form-seccion" placeholder="Ej. General o Tools" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-2 text-sm text-white focus:outline-none">
            </div>

            <button onclick="guardarNuevoArticulo()" class="w-full bg-green-500 hover:bg-green-600 text-white font-bold py-3 rounded-xl text-sm transition">
                Guardar Artículo
            </button>
        </div>
    </div>

    <script src="data.js"></script>
    <script>
        let listaArticulos = JSON.parse(localStorage.getItem('svqh_items')) || ARTICULOS_INICIALES;
        let autenticado = false;
        const CLAVE_CORRECTA = "SVQH1234"; 
        let seccionesAbiertas = {}; 

        function cambiarPestana(target) {
            const btnLista = document.getElementById('btn-lista');
            const btnAdmin = document.getElementById('btn-admin');
            const pLista = document.getElementById('pestana-lista');
            const pAdmin = document.getElementById('pestana-admin');

            if (target === 'lista') {
                btnLista.className = "flex-1 py-2 rounded-md text-center bg-sky-500 text-white transition-all";
                btnAdmin.className = "flex-1 py-2 rounded-md text-center text-slate-400 transition-all";
                pLista.classList.remove('hidden');
                pAdmin.classList.add('hidden');
                filtrarYAgrupar();
            } else {
                btnAdmin.className = "flex-1 py-2 rounded-md text-center bg-sky-500 text-white transition-all";
                btnLista.className = "flex-1 py-2 rounded-md text-center text-slate-400 transition-all";
                pAdmin.classList.remove('hidden');
                pLista.classList.add('hidden');
                evaluarAuthUI();
            }
        }

        function filtrarYAgrupar() {
            const query = document.getElementById('buscador').value.toLowerCase().trim();
            const contenedor = document.getElementById('contenedor-secciones');
            const contadorGral = document.getElementById('contador-items');
            
            contenedor.innerHTML = '';

            const filtrados = listaArticulos.filter(item => 
                item.articulo.toLowerCase().includes(query) || 
                item.pn.toLowerCase().includes(query) ||
                item.seccion.toLowerCase().includes(query)
            );

            contadorGral.innerText = filtrados.length;

            if (filtrados.length === 0) {
                contenedor.innerHTML = `<div class="text-center text-xs text-slate-500 py-8">No se encontraron resultados para la búsqueda.</div>`;
                return;
            }

            const grupos = {};
            filtrados.forEach(item => {
                if (!grupos[item.seccion]) {
                    grupos[item.seccion] = [];
                }
                grupos[item.seccion].push(item);
            });

            Object.keys(grupos).sort().forEach(nombreSeccion => {
                const itemsDelGrupo = grupos[nombreSeccion];
                const estaAbierto = query !== '' ? true : (seccionesAbiertas[nombreSeccion] || false);
                const idLimpio = nombreSeccion.replace(/[^a-zA-Z0-9]/g, '-');

                const divGrupo = document.createElement('div');
                divGrupo.className = "bg-slate-900 border border-slate-800 rounded-xl overflow-hidden shadow-md";

                const botonCabecera = document.createElement('button');
                botonCabecera.className = "w-full flex justify-between items-center bg-slate-800 px-4 py-3 text-left font-bold text-xs text-sky-400 tracking-wider uppercase focus:outline-none transition-colors hover:bg-slate-800/80";
                botonCabecera.onclick = () => togglerSeccion(nombreSeccion);
                botonCabecera.innerHTML = `
                    <div class="flex items-center space-x-2">
                        <span>📂 ${nombreSeccion}</span>
                        <span class="bg-slate-950 text-slate-400 font-mono text-[10px] px-1.5 py-0.5 rounded-full">${itemsDelGrupo.length}</span>
                    </div>
                    <span id="flecha-${idLimpio}" class="text-slate-400 font-mono text-sm transition-transform duration-200 ${estaAbierto ? 'rotate-180' : ''}">
                        ${estaAbierto ? '▲' : '▼'}
                    </span>
                `;
                divGrupo.appendChild(botonCabecera);

                const contenedorTarjetas = document.createElement('div');
                contenedorTarjetas.id = `bloque-${idLimpio}`;
                contenedorTarjetas.className = `p-3 space-y-2.5 bg-slate-900/40 ${estaAbierto ? '' : 'hidden'}`;

                itemsDelGrupo.forEach(item => {
                    const card = document.createElement('div');
                    card.className = "bg-slate-800 border border-slate-700/40 rounded-lg p-3 flex flex-col space-y-1";
                    card.innerHTML = `
                        <h4 class="font-bold text-white text-xs tracking-wide uppercase">${item.articulo}</h4>
                        <div class="flex items-center justify-between text-xs pt-1">
                            <span class="text-[11px] text-slate-400 font-medium">P/N:</span>
                            <code class="text-[11px] font-mono font-bold text-amber-400 bg-slate-950 px-2 py-0.5 rounded border border-slate-800 select-all">${item.pn}</code>
                        </div>
                    `;
                    contenedorTarjetas.appendChild(card);
                });

                divGrupo.appendChild(contenedorTarjetas);
                contenedor.appendChild(divGrupo);
            });
        }

        function togglerSeccion(nombreSeccion) {
            const idLimpio = nombreSeccion.replace(/[^a-zA-Z0-9]/g, '-');
            const bloque = document.getElementById(`bloque-${idLimpio}`);
            const flecha = document.getElementById(`flecha-${idLimpio}`);
            
            if (bloque.classList.contains('hidden')) {
                bloque.classList.remove('hidden');
                flecha.innerText = '▲';
                seccionesAbiertas[nombreSeccion] = true;
            } else {
                bloque.classList.add('hidden');
                flecha.innerText = '▼';
                seccionesAbiertas[nombreSeccion] = false;
            }
        }

        function verificarPassword() {
            const pass = document.getElementById('input-password').value;
            if (pass === CLAVE_CORRECTA) {
                autenticado = true;
                evaluarAuthUI();
            } else {
                alert("Contraseña incorrecta");
            }
        }

        function evaluarAuthUI() {
            const authBlock = document.getElementById('bloqueo-auth');
            const formBlock = document.getElementById('formulario-anadir');
            if (autenticado) {
                authBlock.classList.add('hidden');
                formBlock.classList.remove('hidden');
            } else {
                authBlock.classList.remove('hidden');
                formBlock.classList.add('hidden');
            }
        }

        function cerrarSesion() {
            autenticado = false;
            document.getElementById('input-password').value = '';
            evaluarAuthUI();
        }

        function guardarNuevoArticulo() {
            const art = document.getElementById('form-articulo').value.trim();
            const pn = document.getElementById('form-pn').value.trim();
            let sec = document.getElementById('form-seccion').value.trim();

            if (!art || !pn || !sec) {
                alert("Por favor, completa todos los campos.");
                return;
            }

            listaArticulos.unshift({ articulo: art, pn: pn, seccion: sec });
            localStorage.setItem('svqh_items', JSON.stringify(listaArticulos));

            alert("¡Artículo añadido correctamente!");
            
            document.getElementById('form-articulo').value = '';
            document.getElementById('form-pn').value = '';
            document.getElementById('form-seccion').value = '';
            
            seccionesAbiertas[sec] = true;
            cambiarPestana('lista');
        }

        filtrarYAgrupar();
    </script>
</body>
</html>
